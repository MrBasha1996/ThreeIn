<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Recipe Costing System</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#111110;--ink2:#2c2c2a;--dust:#7a7a76;--smoke:#b0b0aa;--fog:#deded8;--mist:#efefeb;--paper:#f7f7f4;--white:#ffffff;--ok:#1a7f4b;--ok-bg:#e8f5ee;--warn:#9a6200;--warn-bg:#fff3d6;--hot:#c0392b;--hot-bg:#fdecea;--info:#1a5a9a;--info-bg:#e6f0fb;--app:#6b3fa0;--app-bg:#f2ecfb;--r:8px;--rl:12px;--bh:54px}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-tap-highlight-color:transparent}
body{font-family:"Noto Sans Arabic","Sora",sans-serif;background:var(--paper);color:var(--ink);min-height:100dvh;line-height:1.5}
.bar{height:var(--bh);background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;position:sticky;top:0;z-index:300;gap:8px}
.logo{display:flex;align-items:center;gap:8px;min-width:0;flex-shrink:0}
.logo-mark{font-size:15px;font-weight:600;color:#fff;font-family:"Sora",sans-serif;letter-spacing:-0.5px;white-space:nowrap}
.logo-sep{width:1px;height:18px;background:rgba(255,255,255,.15)}
.logo-lbl{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.06em;white-space:nowrap}
.bar-r{display:flex;gap:5px;align-items:center;flex-shrink:0}
.cbadge{font-size:10px;color:rgba(255,255,255,.4);padding:2px 8px;border:1px solid rgba(255,255,255,.12);border-radius:20px;white-space:nowrap}
.tbtn{padding:6px 11px;border-radius:var(--r);font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);transition:all .15s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn:hover{border-color:rgba(255,255,255,.5);color:#fff}
.tbtn-p{background:var(--white);color:var(--ink);border-color:var(--white);font-weight:600}
.tbtn-p:hover{background:var(--mist);color:var(--ink)}
.tbtn.on{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4);color:#fff}
.sync-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#4ade80}
.sync-dot.err{background:#f87171}
.sync-dot.loading{background:#fbbf24;animation:pulse .7s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.brand-bar{background:var(--white);border-bottom:1px solid var(--fog);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--bh);z-index:200}
.brand-bar::-webkit-scrollbar{display:none}
.brand-tab{flex-shrink:0;padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--dust);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.brand-tab:hover{color:var(--ink)}
.brand-tab.act-ti{color:#111110;border-bottom-color:#111110}
.brand-tab.act-bb{color:#8b4513;border-bottom-color:#8b4513}
.nav-bar{background:var(--white);border-bottom:1px solid var(--fog);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:calc(var(--bh) + 42px);z-index:199}
.nav-bar::-webkit-scrollbar{display:none}
.ntab{flex-shrink:0;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--dust);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.ntab:hover{color:var(--ink)}
.ntab.on{color:var(--ink);border-bottom-color:var(--ink)}
.pg{display:none;padding:1rem}
.pg.show{display:block}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.sec-title{font-size:16px;font-weight:500;font-family:"Sora",sans-serif}
.fcard{background:var(--white);border:1px solid var(--fog);border-radius:var(--rl);padding:1rem;margin-bottom:12px}
.fcard h3{font-size:11px;font-weight:600;color:var(--dust);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-family:"Sora",sans-serif;padding-bottom:8px;border-bottom:1px solid var(--fog)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:520px){.fg,.fg3{grid-template-columns:1fr 1fr}}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;color:var(--dust);text-transform:uppercase;letter-spacing:.04em;font-family:"Sora",sans-serif}
.field input,.field select{padding:8px 10px;background:var(--paper);border:1px solid var(--fog);border-radius:var(--r);color:var(--ink);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus{border-color:var(--ink);background:var(--white)}
.field input::placeholder{color:var(--smoke)}
.form-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:10px}
.btn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--fog);background:transparent;color:var(--dust)}
.btn:hover{border-color:var(--ink);color:var(--ink);background:var(--mist)}
.btn-p{background:var(--ink);color:var(--white);border-color:var(--ink)}
.btn-p:hover{background:var(--ink2)}
.app-toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--paper);border:1px solid var(--fog);border-radius:var(--r);cursor:pointer;transition:all .15s;user-select:none}
.app-toggle:hover,.app-toggle.on{background:var(--app-bg);border-color:rgba(107,63,160,.3)}
.app-toggle input{width:15px;height:15px;accent-color:var(--app);cursor:pointer}
.app-toggle span{font-size:12px;color:var(--dust)}
.app-toggle.on span{color:var(--app);font-weight:500}
.app-prow{display:none;flex-direction:column;gap:4px;margin-top:8px;max-width:200px}
.app-prow.show{display:flex}
.dtable-wrap{background:var(--white);border:1px solid var(--fog);border-radius:var(--rl);overflow:hidden;margin-bottom:12px}
.dtable-head{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;border-bottom:1px solid var(--fog);gap:8px;flex-wrap:wrap}
.dth-title{font-size:13px;font-weight:500}
.dtable-search{position:relative;flex:1;max-width:200px}
.dtable-search input{width:100%;padding:6px 10px 6px 26px;background:var(--paper);border:1px solid var(--fog);border-radius:var(--r);font-size:12px;font-family:inherit;outline:none;color:var(--ink)}
.dtable-search input:focus{border-color:var(--ink)}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--smoke);font-size:13px;pointer-events:none}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{background:var(--paper);padding:7px 10px;text-align:right;font-size:10px;font-weight:600;color:var(--dust);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--fog);font-family:"Sora",sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--fog);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--mist)}
td{padding:7px 10px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
.td-n{font-weight:500}
.td-m{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--smoke)}
.td-p{font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:500}
.td-act{display:flex;gap:4px;justify-content:flex-end}
.ibtn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:5px;font-size:13px;transition:all .12s;color:var(--dust);line-height:1}
.ibtn:hover{background:var(--mist);color:var(--ink)}
.ibtn.ed:hover{color:var(--info);background:var(--info-bg)}
.ibtn.dl:hover{color:var(--hot);background:var(--hot-bg)}
.app-pill{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--app-bg);color:var(--app);border:1px solid rgba(107,63,160,.2);font-weight:600;white-space:nowrap}
.cat-pill{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--mist);color:var(--dust);border:1px solid var(--fog)}
.new-pill{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--warn-bg);color:var(--warn);border:1px solid rgba(154,98,0,.2);font-weight:600}
.tot-row{font-size:11px;color:var(--dust);padding:6px 10px;border-top:1px solid var(--fog);background:var(--paper);text-align:left}
.empty-row{padding:2rem;text-align:center;color:var(--smoke);font-size:13px}
.clayout{display:grid;grid-template-columns:256px 1fr;min-height:calc(100dvh - var(--bh) - 84px)}
@media(max-width:680px){.clayout{grid-template-columns:1fr;min-height:auto}}
.csb{background:var(--white);border-left:1px solid var(--fog);height:calc(100dvh - var(--bh) - 84px);position:sticky;top:calc(var(--bh) + 84px);overflow:hidden;display:flex;flex-direction:column}
@media(max-width:680px){.csb{height:auto;position:static;border-left:none;border-bottom:1px solid var(--fog);max-height:230px}}
.csb-hd{padding:.7rem 1rem .6rem;border-bottom:1px solid var(--fog)}
.csb-lbl{font-size:10px;font-weight:600;color:var(--dust);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;font-family:"Sora",sans-serif}
.csb-sw{position:relative}
.csb-sw input{width:100%;padding:7px 10px 7px 27px;background:var(--paper);border:1px solid var(--fog);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--ink)}
.csb-sw input:focus{border-color:var(--ink)}
.plist{overflow-y:auto;flex:1;padding:5px}
.pi{padding:8px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all .12s}
.pi:hover{background:var(--mist)}
.pi.sel{background:var(--ink);border-color:var(--ink)}
.pi.sel .pn{color:#fff}
.pi.sel .psku,.pi.sel .pprice{color:rgba(255,255,255,.5)}
.pi.sel .app-pill{background:rgba(107,63,160,.3);color:#d4b8f5;border-color:transparent}
.pi.sv{border-right:3px solid var(--ok)}
.pi.sel.sv{border-right:3px solid #6ee7a8}
.pn{font-size:13px;color:var(--ink);line-height:1.3}
.pmeta{display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap}
.psku{font-size:10px;font-family:"IBM Plex Mono",monospace;color:var(--smoke)}
.pprice{font-size:11px;color:var(--ink2);font-weight:500}
.cmain{padding:1rem;overflow-y:auto}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--fog);flex-wrap:wrap;gap:10px}
.ph-l h2{font-size:17px;font-weight:500;margin-bottom:4px;font-family:"Sora",sans-serif}
.phsku{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--smoke)}
.price-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.pbox{background:var(--white);border:1px solid var(--fog);border-radius:var(--r);padding:8px 12px;min-width:100px}
.pbox.app{background:var(--app-bg);border-color:rgba(107,63,160,.25)}
.pb-lbl{font-size:9px;font-weight:600;color:var(--dust);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;font-family:"Sora",sans-serif}
.pb-lbl.app{color:var(--app)}
.pb-row{display:flex;align-items:baseline;gap:3px}
.pb-inp{background:transparent;border:none;outline:none;font-family:"IBM Plex Mono",monospace;font-size:15px;font-weight:500;color:var(--ink);width:80px;text-align:right}
.pbox.app .pb-inp{color:var(--app)}
.pb-unit{font-size:11px;color:var(--dust)}
.pb-diff{font-size:10px;font-family:"IBM Plex Mono",monospace;margin-top:2px}
.yield-g{display:flex;align-items:center;gap:5px}
.yield-g label{font-size:11px;color:var(--dust);font-weight:500}
.yield-inp{background:var(--white);border:1px solid var(--fog);border-radius:var(--r);color:var(--ink);font-family:"IBM Plex Mono",monospace;outline:none;text-align:center;width:48px;padding:5px;font-size:13px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
@media(max-width:500px){.metrics{grid-template-columns:1fr 1fr}}
.mc{background:var(--white);border:1px solid var(--fog);border-radius:var(--rl);padding:.8rem}
.mc-lbl{font-size:9px;font-weight:600;color:var(--dust);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;font-family:"Sora",sans-serif}
.mc-val{font-size:18px;font-weight:500;font-family:"IBM Plex Mono",monospace;color:var(--ink)}
.mc-sub{font-size:9px;color:var(--smoke);margin-top:1px}
.fcw{background:var(--white);border:1px solid var(--fog);border-radius:var(--rl);padding:.85rem;margin-bottom:1rem}
.fc-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fc-ttl{font-size:9px;font-weight:600;color:var(--dust);text-transform:uppercase;letter-spacing:.05em;font-family:"Sora",sans-serif}
.fc-pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:4px}
.fc-bg{height:7px;background:var(--mist);border-radius:4px;overflow:hidden;margin-bottom:4px}
.fc-bar{height:100%;border-radius:4px;transition:width .4s,background .3s}
.fc-zones{display:flex;justify-content:space-between;font-size:9px;color:var(--smoke);font-family:"IBM Plex Mono",monospace}
.iw{background:var(--white);border:1px solid var(--fog);border-radius:var(--rl);overflow:hidden;margin-bottom:1rem}
.iinp,.qinp,.upinp{background:transparent;border:none;outline:none;color:var(--ink);font-family:inherit;font-size:12px;width:100%;padding:2px 3px;border-radius:3px}
.iinp:focus,.qinp:focus,.upinp:focus{background:var(--paper);border:1px solid var(--fog)}
.qinp,.upinp{font-family:"IBM Plex Mono",monospace;text-align:center}
.usel{background:transparent;border:none;outline:none;color:var(--dust);font-family:inherit;font-size:11px;cursor:pointer;width:100%}
.ccell{font-family:"IBM Plex Mono",monospace;font-size:11px;color:#4a4a47;text-align:center}
.drow{background:none;border:none;cursor:pointer;color:var(--smoke);padding:2px 4px;border-radius:3px;font-size:12px;line-height:1;transition:all .12s}
.drow:hover{color:var(--hot);background:var(--hot-bg)}
.add-btn{width:100%;padding:8px 12px;background:none;border:none;border-top:1px solid var(--fog);color:var(--dust);cursor:pointer;font-family:inherit;font-size:12px;display:flex;align-items:center;gap:5px;font-weight:500;transition:all .12s}
.add-btn:hover{color:var(--ink);background:var(--mist)}
.acw{position:relative}
.acl{position:absolute;top:calc(100% + 3px);right:0;left:0;z-index:400;background:var(--white);border:1px solid var(--fog);border-radius:var(--r);max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none}
.acl.open{display:block}
.acr{padding:7px 10px;cursor:pointer;font-size:12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--fog);transition:background .1s}
.acr:last-child{border-bottom:none}
.acr:hover{background:var(--mist)}
.act{font-size:10px;color:var(--dust);padding:1px 4px;background:var(--paper);border-radius:3px;border:1px solid var(--fog);white-space:nowrap}
.saved-sec{margin-top:1.25rem}
.saved-ttl{font-size:10px;font-weight:600;color:var(--dust);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;font-family:"Sora",sans-serif}
.saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px}
.scard{background:var(--white);border:1px solid var(--fog);border-radius:var(--rl);padding:.8rem;cursor:pointer;transition:all .15s;position:relative}
.scard:hover{border-color:var(--ink)}
.sc-name{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:4px;padding-left:22px;line-height:1.3}
.sc-stats{display:flex;gap:4px;flex-wrap:wrap}
.sc-s{font-size:10px;font-family:"IBM Plex Mono",monospace;color:var(--dust);background:var(--paper);padding:1px 5px;border-radius:3px}
.scdel{position:absolute;top:7px;left:7px;background:none;border:none;cursor:pointer;color:var(--smoke);font-size:12px;padding:3px;border-radius:3px;transition:all .12s;line-height:1}
.scdel:hover{color:var(--hot);background:var(--hot-bg)}
.empty{text-align:center;padding:3rem 1rem;color:var(--smoke);display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-ic{width:44px;height:44px;border:2px solid var(--fog);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--fog)}
.ov{position:fixed;inset:0;background:rgba(17,17,16,.55);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:1rem}
.ov.hidden{display:none}
.modal{background:var(--white);border:1px solid var(--fog);border-radius:var(--rl);padding:1.5rem;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.mhd{display:flex;align-items:center;gap:10px;margin-bottom:.75rem}
.mhd h3{font-size:15px;font-weight:500;font-family:"Sora",sans-serif}
.modal p{font-size:13px;color:var(--dust);margin-bottom:1rem;line-height:1.65}
.step{display:flex;gap:9px;align-items:flex-start;margin-bottom:8px}
.stepn{min-width:20px;height:20px;border-radius:50%;background:var(--ink);color:var(--white);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.step span{font-size:13px;line-height:1.5}
.mfoot{display:flex;gap:7px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}
.mbtn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid var(--fog);background:transparent;color:var(--dust);transition:all .15s}
.mbtn:hover{border-color:var(--ink);color:var(--ink);background:var(--mist)}
.mbtn-dr{border-color:#4285f4;color:#4285f4}
.mbtn-dr:hover{background:#e8f0fe}
.mbtn-p{background:var(--ink);color:var(--white);border-color:var(--ink)}
.mbtn-p:hover{background:var(--ink2)}
.tst{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);border-radius:8px;padding:9px 18px;font-size:13px;z-index:600;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.tst.show{opacity:1}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">
    <span class="logo-mark">3IN</span>
    <div class="logo-sep"></div>
    <span class="logo-lbl" id="brand-lbl">Recipe Costing</span>
  </div>
  <div class="bar-r">
    <div class="sync-dot" id="sync-dot" title="حالة الحفظ على Sheets"></div>
    <span class="cbadge" id="cbadge">0 وصفة</span>
    <button class="tbtn" onclick="loadFromSheets()" title="تحميل من Sheets">↻ Sheets</button>
    <button class="tbtn" onclick="openExport()">⬇ Excel</button>
    <button class="tbtn tbtn-p" id="sbtn" onclick="saveRecipe()">حفظ</button>
  </div>
</div>
<div class="brand-bar">
  <button class="brand-tab act-ti" id="btab-ti" onclick="setBrand('ti')">Three In</button>
  <button class="brand-tab" id="btab-bb" onclick="setBrand('bb')">باب البلد</button>
</div>
<div class="nav-bar">
  <button class="ntab on" id="ntab-costing" onclick="setNav('costing')">الوصفات</button>
  <button class="ntab" id="ntab-products" onclick="setNav('products')">المنتجات</button>
  <button class="ntab" id="ntab-ingredients" onclick="setNav('ingredients')">المواد الخام</button>
</div>
<!-- Costing page -->
<div class="pg show" id="pg-costing">
  <div class="clayout">
    <aside class="csb">
      <div class="csb-hd">
        <div class="csb-lbl">اختر منتجاً</div>
        <div class="csb-sw"><span class="si">⌕</span><input type="text" id="csq" placeholder="بحث..." oninput="renderCsb()"></div>
      </div>
      <div style="padding:5px;border-bottom:1px solid var(--fog);display:flex;gap:3px">
        <button class="ntab on" style="font-size:11px;padding:5px 10px" onclick="setCF('all',this)">الكل</button>
        <button class="ntab" style="font-size:11px;padding:5px 10px" onclick="setCF('saved',this)">✓ محفوظ</button>
      </div>
      <div class="plist" id="csb-list"></div>

let brand='ti',nav='costing',cf='all',cur=null;
function lk(k){return `3in_${brand}_${k}`;}
function gR(){return JSON.parse(localStorage.getItem(lk('r'))||'{}');}
function sR(v){localStorage.setItem(lk('r'),JSON.stringify(v));}
function gP(){return JSON.parse(localStorage.getItem(lk('p'))||'[]');}

function gI(){return JSON.parse(localStorage.getItem(lk('i'))||'[]');}

function gAO(){return JSON.parse(localStorage.getItem(lk('ao'))||'{}');}
function sAO(v){localStorage.setItem(lk('ao'),JSON.stringify(v));}
function aP(){return[...BRANDS[brand].products,...gP()];}
function aI(){return[...BRANDS[brand].ingredients,...gI()];}
function getApp(p){const ao=gAO();if(ao[p.sku]!==undefined)return ao[p.sku];return p.app_price!=null?{on:true,app_price:p.app_price}:{on:false,app_price:null};}

  const w=document.getElementById(px+'-app-prow');

}

function renderCsb(){
  const q=(document.getElementById('csq')?.value||'').toLowerCase();
  const R=gR();
  let items=aP();
  if(cf==='saved')items=items.filter(p=>R[p.sku]);
  if(q)items=items.filter(p=>p.name.toLowerCase().includes(q)||p.sku.includes(q));
  document.getElementById('csb-list').innerHTML=items.map(p=>{
    const ap=getApp(p);
    return`<div class="pi ${cur?.sku===p.sku?'sel':''} ${R[p.sku]?'sv':''}" onclick="pick('${p.sku}')">
      <div class="pn">${p.name}</div>
      <div class="pmeta">
        <span class="psku">${p.sku}</span>
        <span class="pprice">${p.price.toFixed(0)} ﷼</span>
        ${ap.on?`<span class="app-pill">APP ${ap.app_price?ap.app_price.toFixed(0):''} ﷼</span>`:''}
        ${R[p.sku]?'<span style="color:var(--ok);font-size:10px;font-weight:600">✓</span>':''}
        ${p._custom?'<span class="new-pill">جديد</span>':''}
      </div>
    </div>`;
  }).join('')||'<div style="padding:1.5rem;color:var(--smoke);font-size:13px;text-align:center">لا نتائج</div>';
}
function pick(sku){cur=aP().find(p=>p.sku===sku);renderCsb();renderCMain();}
function getRows(){
  return Array.from(document.querySelectorAll('#ing-tbody tr')).map(tr=>({
    ingName:tr.querySelector('.iinp')?.value||'',ingSku:tr.dataset.sku||'',
    qty:parseFloat(tr.querySelector('.qinp')?.value)||0,
    unit:tr.querySelector('.usel')?.value||'',
    unitCost:parseFloat(tr.querySelector('.upinp')?.value)||0
  }));
}
function calc(){
  const yi=Math.max(1,parseInt(document.getElementById('yi')?.value)||1);
  const sp=parseFloat(document.getElementById('si')?.value)||0;
  const apEl=document.getElementById('ai');const ap=apEl?parseFloat(apEl.value)||0:0;
  const tot=getRows().reduce((s,r)=>s+r.qty*r.unitCost,0);
  const ps=tot/yi;
  return{ps,fc:sp>0?ps/sp*100:0,margin:sp-ps,margin_app:ap>0?ap-ps:null,sug:ps>0?ps/0.32:0,sp,ap};
}
function upd(){
  const{ps,fc,margin,margin_app,sug,sp,ap}=calc();
  const e=id=>document.getElementById(id);
  if(!e('mc'))return;
  e('mc').textContent=ps.toFixed(2);
  e('mfc').textContent=sp>0?fc.toFixed(1)+'%':'—';
  e('mm').textContent=sp>0?margin.toFixed(2):'—';
  if(sp>0)e('mm').style.color=margin>=0?'var(--ok)':'var(--hot)';
  const ms=e('ms');if(ms)ms.textContent=sug>0?sug.toFixed(1)+' ﷼':'—';
  const am=e('am');if(am){am.textContent=margin_app!=null?margin_app.toFixed(2):'—';if(margin_app!=null)am.style.color=margin_app>=0?'var(--app)':'var(--hot)';}
  const diff=e('apdiff');const sp2=parseFloat(document.getElementById('si')?.value)||0;
  if(diff&&ap>0&&sp2>0){const d=ap-sp2;diff.textContent=(d>=0?'+':'')+d.toFixed(1)+' ﷼ عن Dine';diff.style.color=d>0?'var(--ok)':d<0?'var(--hot)':'var(--dust)';}
  const bar=e('fcbar');if(!bar)return;
  bar.style.width=(sp>0?Math.min(fc,60)/60*100:0)+'%';
  let col,bg,lbl;
  if(fc<=25){col='var(--ok)';bg='var(--ok-bg)';lbl='ممتاز';}
  else if(fc<=33){col='#3a8c3a';bg='#e8f5e8';lbl='جيد';}
  else if(fc<=40){col='var(--warn)';bg='var(--warn-bg)';lbl='مقبول';}
  else{col='var(--hot)';bg='var(--hot-bg)';lbl='مرتفع';}
  bar.style.background=col;
  const pill=e('fcpill');pill.style.background=bg;pill.style.color=col;pill.textContent=sp>0?lbl:'—';
  document.querySelectorAll('.ccell').forEach((td,i)=>{const r=getRows()[i];if(r)td.textContent=(r.qty*r.unitCost).toFixed(3);});
}
function addCostRow(d={}){
  const tb=document.getElementById('ing-tbody');if(!tb)return;
  const tr=document.createElement('tr');tr.dataset.sku=d.sku||d.ingSku||'';
  const units=['جرام','كيلو','ميليلتر','لتر','حبة','قطعة','زجاجة','مليلتر','مل','علبة','g','ml','pcs'];
  tr.innerHTML=`<td style="width:35%"><div class="acw"><input class="iinp" type="text" value="${d.name||d.ingName||''}" placeholder="المادة..." oninput="acIn(this)" onfocus="acIn(this)" onblur="acHide(this)"><div class="acl"></div></div></td>
    <td style="width:11%"><input class="qinp" type="number" value="${d.qty||''}" placeholder="0" min="0" step="0.1" oninput="upd()"></td>
    <td style="width:12%"><select class="usel" onchange="upd()">${units.map(u=>`<option${u===(d.unit||'جرام')?' selected':''}>${u}</option>`).join('')}</select></td>
    <td style="width:14%"><input class="upinp" type="number" value="${d.unitCost||d.cost||''}" placeholder="0.000" min="0" step="0.001" oninput="upd()"></td>
    <td class="ccell" style="width:13%">${d.qty&&(d.unitCost||d.cost)?(d.qty*(d.unitCost||d.cost)).toFixed(3):'0.000'}</td>
    <td style="width:5%;text-align:center"><button class="drow" onclick="this.closest('tr').remove();upd()">✕</button></td>`;
  tb.appendChild(tr);upd();
}
function acIn(i){
  const v=i.value.trim().toLowerCase(),l=i.nextElementSibling;
  if(!v){l.classList.remove('open');return;}
  const m=aI().filter(x=>x.name.toLowerCase().includes(v)||x.sku.includes(v)).slice(0,12);
  if(!m.length){l.classList.remove('open');return;}
  l.innerHTML=m.map(x=>`<div class="acr" onmousedown="acPick(event,'${x.sku}')"><span>${x.name}</span><span class="act">${x.category}·${x.unit}</span></div>`).join('');
  l.classList.add('open');
}
function acHide(i){setTimeout(()=>i.nextElementSibling.classList.remove('open'),200)}
function acPick(e,sku){
  e.preventDefault();
  const x=aI().find(i=>i.sku===sku);if(!x)return;
  const tr=e.target.closest('.acl').previousElementSibling.closest('tr');
  tr.dataset.sku=x.sku;tr.querySelector('.iinp').value=x.name;
  tr.querySelector('.usel').value=x.unit;tr.querySelector('.upinp').value=x.cost;
  tr.querySelector('.acl').classList.remove('open');tr.querySelector('.qinp').focus();upd();
}

  if(cur){const ap=parseFloat(document.getElementById('ai')?.value)||null;const ao=gAO();ao[cur.sku]={on:chk.checked,app_price:ap};sAO(ao);}
}

          <div class="pbox"><div class="pb-lbl">Dine In</div><div class="pb-row"><input class="pb-inp" id="si" type="number" value="${sv?.sellPrice||p.price}" min="0" step="0.5" oninput="upd()"><span class="pb-unit">﷼</span></div></div>
          <div id="app-price-row" style="display:${hasApp?'flex':'none'};flex-direction:column;gap:3px">
            <div class="pbox app"><div class="pb-lbl app">APP</div><div class="pb-row"><input class="pb-inp" id="ai" type="number" value="${sv?.appPrice||appState.app_price||''}" min="0" step="0.5" oninput="upd()"><span class="pb-unit" style="color:var(--app)">﷼</span></div><div class="pb-diff" id="apdiff"></div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="metrics">
      <div class="mc"><div class="mc-lbl">تكلفة/حصة</div><div class="mc-val" id="mc">0.00</div><div class="mc-sub">ريال</div></div>
      <div class="mc"><div class="mc-lbl">Food Cost%</div><div class="mc-val" id="mfc">—</div></div>
      <div class="mc"><div class="mc-lbl">هامش Dine</div><div class="mc-val" id="mm">—</div></div>
      ${hasApp?'<div class="mc" style="border-color:rgba(107,63,160,.2);background:var(--app-bg)"><div class="mc-lbl" style="color:var(--app)">هامش APP</div><div class="mc-val" id="am" style="color:var(--app)">—</div></div>':'<div class="mc"><div class="mc-lbl">سعر مقترح 32%</div><div class="mc-val" id="ms" style="color:var(--info)">—</div></div>'}
    </div>
    <div class="fcw">
      <div class="fc-hd"><span class="fc-ttl">Food Cost Bar</span><span class="fc-pill" id="fcpill" style="background:var(--ok-bg);color:var(--ok)">—</span></div>
      <div class="fc-bg"><div class="fc-bar" id="fcbar" style="width:0%"></div></div>
      <div class="fc-zones"><span>0%</span><span>25%</span><span>33%</span><span>40%</span><span>60%</span></div>
    </div>
    <div style="font-size:10px;font-weight:600;color:var(--dust);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:space-between"><span>المكونات</span><span style="font-weight:400;color:var(--smoke)">${aI().length} مادة</span></div>
    <div class="iw">
      <table><thead><tr><th style="width:35%">المادة</th><th style="width:11%;text-align:center">الكمية</th><th style="width:12%;text-align:center">الوحدة</th><th style="width:14%;text-align:center">سعر الوحدة ﷼</th><th style="width:13%;text-align:center">التكلفة ﷼</th><th style="width:5%"></th></tr></thead>
      <tbody id="ing-tbody"></tbody></table>
      <button class="add-btn" onclick="addCostRow()">+ مكوّن</button>
    </div>
    ${Object.keys(R).length?renderSavedHTML():''}
  `;
  if(ings.length)ings.forEach(i=>addCostRow(i));else addCostRow();
  upd();
}
function renderSavedHTML(){
  const R=gR(),saved=Object.values(R);if(!saved.length)return'';
  return`<div class="saved-sec"><div class="saved-ttl">الوصفات المحفوظة (${saved.length})</div>
    <div class="saved-grid">${saved.map(r=>`<div class="scard" onclick="pick('${r.sku}')">
      <button class="scdel" onclick="event.stopPropagation();delR('${r.sku}')">✕</button>
      <div class="sc-name">${r.productName}</div>
      <div class="sc-stats">
        <span class="sc-s">FC: ${r.foodCostPct}%</span>
        <span class="sc-s">${r.margin} ﷼</span>
        ${r.margin_app!=null?`<span class="sc-s" style="color:var(--app)">${r.margin_app} ﷼ APP</span>`:''}
      </div>
    </div>`).join('')}</div></div>`;
}
function delR(sku){
  if(!confirm('حذف الوصفة؟'))return;
  const R=gR();delete R[sku];sR(R);badge();
  syncAction('deleteRecipe',{sku,brand});
  toast('🗑 تم الحذف');renderCMain();
}
function saveRecipe(){
  if(!cur){toast('⚠ اختر منتجاً أولاً');return;}
  const r=getRows().filter(x=>x.ingName);
  const yi=parseInt(document.getElementById('yi')?.value)||1;
  const sp=parseFloat(document.getElementById('si')?.value)||0;
  const apChk=document.getElementById('app-on-check');
  const ap=apChk&&apChk.checked?(parseFloat(document.getElementById('ai')?.value)||0):0;
  const{ps,fc,margin,margin_app}=calc();
  const rec={brand,productName:cur.name,sku:cur.sku,sellPrice:sp,appPrice:ap||null,yield:yi,
    ingredients:r,totalCost:+ps.toFixed(4),foodCostPct:+fc.toFixed(1),
    margin:+margin.toFixed(2),margin_app:margin_app!=null?+margin_app.toFixed(2):null,
    savedAt:new Date().toLocaleString('ar-SA')};
  const R=gR();R[cur.sku]=rec;sR(R);badge();
  syncAction('saveRecipe',{brand,recipe:rec});
  const btn=document.getElementById('sbtn');btn.textContent='✓';setTimeout(()=>btn.textContent='حفظ',2000);
  renderCMain();document.getElementById('modal').classList.remove('hidden');
}
/* ── PRODUCTS CRUD ── */
function renderPT(){
  const q=(document.getElementById('psq')?.value||'').toLowerCase();
  const all=aP();
  const filtered=q?all.filter(p=>p.name.toLowerCase().includes(q)||p.sku.includes(q)):all;
  document.getElementById('p-cnt').textContent=filtered.length+'/'+all.length;
  document.getElementById('p-tbl-title').textContent=(brand==='ti'?'Three In':'باب البلد')+' — المنتجات';
  if(!filtered.length){document.getElementById('p-tbl').innerHTML='<div class="empty-row">لا نتائج</div>';return;}
  document.getElementById('p-tbl').innerHTML=`<table>
    <thead><tr><th style="width:33%">الاسم</th><th style="width:12%">SKU</th><th style="width:15%">الفئة</th><th style="width:10%;text-align:center">Dine</th><th style="width:10%;text-align:center">APP</th><th style="width:20%;text-align:center">إجراءات</th></tr></thead>
    <tbody>${filtered.map(p=>{const ap=getApp(p);return`<tr>
      <td class="td-n" title="${p.name}">${p.name}${p._custom?' <span class="new-pill">جديد</span>':''}</td>
      <td class="td-m">${p.sku}</td>
      <td><span class="cat-pill" title="${p.category||''}">${(p.category||'—').substring(0,10)}</span></td>
      <td class="td-p" style="text-align:center">${p.price.toFixed(1)}</td>
      <td style="text-align:center">${ap.on?`<span class="app-pill">${ap.app_price?.toFixed(1)||'—'}</span>`:'<span style="color:var(--smoke);font-size:11px">—</span>'}</td>
      <td><div class="td-act">
        <button class="ibtn ed" onclick="editP('${p.sku}')" title="تعديل">✏️</button>
        ${p._custom?`<button class="ibtn dl" onclick="deleteP('${p.sku}')" title="حذف">🗑</button>`:''}
      </div></td>
    </tr>`;}).join('')}</tbody></table>
    <div class="tot-row">${filtered.length} من ${all.length} منتج</div>`;
}
function editP(sku){
  const p=aP().find(x=>x.sku===sku);if(!p)return;
  const ap=getApp(p);
  document.getElementById('pf-name').value=p.name;
  document.getElementById('pf-sku').value=p.sku;
  document.getElementById('pf-cat').value=p.category||'';
  document.getElementById('pf-price').value=p.price;
  document.getElementById('pf-esku').value=sku;
  document.getElementById('pf-app-chk').checked=ap.on;
  document.getElementById('pf-app-price').value=ap.app_price||'';
  toggleAPP('pf');
  document.getElementById('pf-title').textContent='تعديل المنتج: '+p.name.substring(0,30);
  document.getElementById('pf-submit-btn').textContent='حفظ التعديل';
  document.getElementById('pf-cancel-btn').style.display='inline-flex';
  document.getElementById('pfcard').scrollIntoView({behavior:'smooth'});
}
function cancelPF(){
  ['pf-name','pf-sku','pf-cat','pf-price','pf-app-price'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pf-esku').value='';
  document.getElementById('pf-app-chk').checked=false;toggleAPP('pf');
  document.getElementById('pf-title').textContent='إضافة منتج جديد';
  document.getElementById('pf-submit-btn').textContent='إضافة ＋';
  document.getElementById('pf-cancel-btn').style.display='none';
}
function submitP(){
  const name=document.getElementById('pf-name').value.trim();
  const sku=document.getElementById('pf-sku').value.trim();
  const cat=document.getElementById('pf-cat').value.trim();
  const price=parseFloat(document.getElementById('pf-price').value)||0;
  const onApp=document.getElementById('pf-app-chk').checked;
  const appP=onApp?(parseFloat(document.getElementById('pf-app-price').value)||null):null;
  const esku=document.getElementById('pf-esku').value;
  if(!name||!sku){toast('⚠ أدخل الاسم والـ SKU');return;}
  const CP=gP(),AO=gAO();
  if(esku){
    const baseP=BRANDS[brand].products.find(p=>p.sku===sku);
    if(baseP){BRANDS[brand].products.find(p=>p.sku===sku).price=price;}
    else{const idx=CP.findIndex(p=>p.sku===esku);if(idx>-1)CP[idx]={...CP[idx],name,price,category:cat};sP(CP);}
    AO[sku]={on:onApp,app_price:appP};sAO(AO);
    syncAction('saveProduct',{brand,product:{sku,name,price,category:cat,app_price:appP}});
    toast('✓ تم التعديل');
  } else {
    if(aP().find(p=>p.sku===sku)){toast('⚠ SKU موجود مسبقاً');return;}
    const np={name,sku,category:cat,price,app_price:appP,_custom:true};
    CP.push(np);sP(CP);
    if(onApp&&appP){AO[sku]={on:true,app_price:appP};sAO(AO);}
    syncAction('saveProduct',{brand,product:np});
    toast('✓ تمت الإضافة: '+name);
  }
  cancelPF();renderPT();renderCsb();
}
function deleteP(sku){
  if(!confirm('حذف المنتج؟'))return;
  const CP=gP();sP(CP.filter(p=>p.sku!==sku));
  const R=gR();delete R[sku];sR(R);
  syncAction('deleteProduct',{brand,sku});
  badge();renderPT();renderCsb();toast('🗑 تم الحذف');
}
/* ── INGREDIENTS CRUD ── */
function renderIT(){
  const q=(document.getElementById('isq')?.value||'').toLowerCase();
  const all=aI();
  const filtered=q?all.filter(i=>i.name.toLowerCase().includes(q)||i.sku.includes(q)||(i.category||'').toLowerCase().includes(q)):all;
  document.getElementById('i-cnt').textContent=filtered.length+'/'+all.length;
  document.getElementById('i-tbl-title').textContent=(brand==='ti'?'Three In':'باب البلد')+' — المواد الخام';
  if(!filtered.length){document.getElementById('i-tbl').innerHTML='<div class="empty-row">لا نتائج</div>';return;}
  document.getElementById('i-tbl').innerHTML=`<table>
    <thead><tr><th style="width:32%">الاسم</th><th style="width:12%">SKU</th><th style="width:14%">الفئة</th><th style="width:12%;text-align:center">الوحدة</th><th style="width:14%;text-align:center">سعر الوحدة ﷼</th><th style="width:16%;text-align:center">إجراءات</th></tr></thead>
    <tbody>${filtered.map(i=>`<tr>
      <td class="td-n" title="${i.name}">${i.name}${i._custom?' <span class="new-pill">جديد</span>':''}</td>
      <td class="td-m">${i.sku}</td>
      <td><span class="cat-pill">${i.category||'—'}</span></td>
      <td style="text-align:center;font-size:12px;color:var(--dust)">${i.unit}</td>
      <td class="td-p" style="text-align:center">${i.cost}</td>
      <td><div class="td-act">
        <button class="ibtn ed" onclick="editI('${i.sku}')" title="تعديل">✏️</button>

    <div class="tot-row">${filtered.length} من ${all.length} مادة</div>`;
}
function editI(sku){
  const i=aI().find(x=>x.sku===sku);if(!i)return;
  document.getElementById('if-name').value=i.name;
  document.getElementById('if-sku').value=i.sku;
  document.getElementById('if-cat').value=i.category||'بقالة';
  document.getElementById('if-unit').value=i.unit||'جرام';
  document.getElementById('if-cost').value=i.cost;
  document.getElementById('if-esku').value=sku;
  document.getElementById('if-title').textContent='تعديل: '+i.name.substring(0,30);
  document.getElementById('if-submit-btn').textContent='حفظ التعديل';
  document.getElementById('if-cancel-btn').style.display='inline-flex';
  document.getElementById('ifcard').scrollIntoView({behavior:'smooth'});
}
function cancelIF(){
  ['if-name','if-sku','if-cost'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('if-esku').value='';
  document.getElementById('if-title').textContent='إضافة مادة خام جديدة';
  document.getElementById('if-submit-btn').textContent='إضافة ＋';
  document.getElementById('if-cancel-btn').style.display='none';
}
function submitI(){
  const name=document.getElementById('if-name').value.trim();
  const sku=document.getElementById('if-sku').value.trim();
  const cat=document.getElementById('if-cat').value;
  const unit=document.getElementById('if-unit').value;
  const cost=parseFloat(document.getElementById('if-cost').value)||0;
  const esku=document.getElementById('if-esku').value;
  if(!name||!sku){toast('⚠ أدخل الاسم والـ SKU');return;}
  const CI=gI();
  if(esku){
    const baseI=BRANDS[brand].ingredients.find(i=>i.sku===sku);
    if(baseI){const idx=BRANDS[brand].ingredients.findIndex(i=>i.sku===sku);if(idx>-1)BRANDS[brand].ingredients[idx]={...BRANDS[brand].ingredients[idx],name,category:cat,unit,cost};}
    else{const idx=CI.findIndex(i=>i.sku===esku);if(idx>-1)CI[idx]={...CI[idx],name,sku,category:cat,unit,cost};sI(CI);}
    syncAction('saveIngredient',{brand,ingredient:{sku,name,category:cat,unit,cost}});
    toast('✓ تم التعديل');
  } else {
    if(aI().find(i=>i.sku===sku)){toast('⚠ SKU موجود مسبقاً');return;}
    CI.push({name,sku,category:cat,unit,cost,_custom:true});sI(CI);
    syncAction('saveIngredient',{brand,ingredient:{sku,name,category:cat,unit,cost,_custom:true}});
    toast('✓ تمت الإضافة: '+name);
  }
  cancelIF();renderIT();
}
function deleteI(sku){
  if(!confirm('حذف المادة؟'))return;
  const CI=gI();sI(CI.filter(i=>i.sku!==sku));
  syncAction('deleteIngredient',{brand,sku});
  renderIT();toast('🗑 تم الحذف');
}
/* ── SHEETS SYNC ── */
function syncAction(action,data){
  sd('loading');
  fetch(GS,{method:'POST',body:JSON.stringify({action,...data}),headers:{'Content-Type':'text/plain'}})
    .then(r=>r.json()).then(d=>sd(d.status==='ok'?'ok':'err')).catch(()=>sd('err'));
}
function loadFromSheets(){
  sd('loading');
  fetch(GS).then(r=>r.json()).then(d=>{
    let cnt=0;
    if(d.recipes&&d.recipes.length){
      ['ti','bb'].forEach(b=>{
        const R={};
        d.recipes.filter(r=>(r.brand||'ti')===b).forEach(row=>{
          if(!row.SKU)return;
          R[row.SKU]={sku:row.SKU,brand:b,productName:row['Product Name'],
            sellPrice:parseFloat(row['Sell Price'])||0,appPrice:parseFloat(row['APP Price'])||null,
            foodCostPct:parseFloat(row['Food Cost %'])||0,margin:parseFloat(row['Margin Dine'])||0,
            margin_app:parseFloat(row['Margin APP'])||null,yield:parseInt(row['Yield'])||1,
            savedAt:row['Saved At'],totalCost:0,
            ingredients:(()=>{try{return JSON.parse(row['Ingredients JSON']||'[]');}catch{return[];}})()};
          cnt++;
        });
        localStorage.setItem(`3in_${b}_r`,JSON.stringify(R));
      });
    }
    if(d.products&&d.products.length){
      ['ti','bb'].forEach(b=>{
        const CP=JSON.parse(localStorage.getItem(`3in_${b}_p`)||'[]');
        d.products.filter(r=>(r.brand||'ti')===b).forEach(row=>{
          if(!row.SKU||CP.find(p=>p.sku===row.SKU))return;
          CP.push({sku:row.SKU,name:row.Name,price:parseFloat(row.Price)||0,app_price:parseFloat(row['APP Price'])||null,category:row.Category||'',_custom:true});
        });
        localStorage.setItem(`3in_${b}_p`,JSON.stringify(CP));
      });
    }
    if(d.ingredients&&d.ingredients.length){
      ['ti','bb'].forEach(b=>{
        const CI=JSON.parse(localStorage.getItem(`3in_${b}_i`)||'[]');
        d.ingredients.filter(r=>(r.brand||'ti')===b).forEach(row=>{
          if(!row.SKU||CI.find(i=>i.sku===row.SKU))return;
          CI.push({sku:row.SKU,name:row.Name,category:row.Category,unit:row.Unit,cost:parseFloat(row.Cost)||0,_custom:true});
        });
        localStorage.setItem(`3in_${b}_i`,JSON.stringify(CI));
      });
    }
    sd('ok');badge();
    if(nav==='costing'){renderCsb();renderCMain();}
    else if(nav==='products')renderPT();
    else renderIT();
    toast(`✓ تم التحميل — ${cnt} وصفة`);
  }).catch(()=>{sd('err');toast('⚠ تعذر الاتصال بـ Sheets');});
}
/* ── EXPORT ── */
function openExport(){const R=gR();if(!Object.keys(R).length){toast('لا توجد وصفات محفوظة');return;}document.getElementById('modal').classList.remove('hidden');}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
function buildWB(){
  const R=gR(),saved=Object.values(R);if(!saved.length)return null;
  const wb=XLSX.utils.book_new();
  const s1=[['ملخص الوصفات','','','','','',''],['براند:',brand==='ti'?'Three In':'باب البلد','تاريخ:',new Date().toLocaleString('ar-SA'),'','',''],
    [],['المنتج','SKU','Dine In','APP','FC%','هامش Dine','هامش APP','الحصص','تاريخ الحفظ']];
  saved.forEach(r=>s1.push([r.productName,r.sku,r.sellPrice,r.appPrice||'—',r.foodCostPct+'%',r.margin,r.margin_app??'—',r.yield,r.savedAt]));
  const ws1=XLSX.utils.aoa_to_sheet(s1);ws1['!cols']=[28,12,10,10,10,10,10,8,18].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws1,'ملخص');
  const s2=[['تفصيل المكونات','','','','','','',''],[],'',['المنتج','Product SKU','المكوّن','Ing SKU','الكمية','الوحدة','سعر الوحدة','التكلفة']];
  saved.forEach(r=>{r.ingredients.filter(i=>i.ingName).forEach(i=>s2.push([r.productName,r.sku,i.ingName,i.ingSku,i.qty,i.unit,i.unitCost,+(i.qty*i.unitCost).toFixed(4)]));s2.push(['','','— إجمالي —','','','','',r.totalCost]);s2.push([]);});
  const ws2=XLSX.utils.aoa_to_sheet(s2);ws2['!cols']=[26,12,26,12,8,10,12,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws2,'مكونات');
  return wb;
}
function dlExcel(){
  const wb=buildWB();if(!wb)return;
  const bn=brand==='ti'?'ThreeIn':'BabAlBalad';
  XLSX.writeFile(wb,`${bn}_${new Date().toLocaleDateString('en').replace(/\//g,'-')}.xlsx`);
  toast('⬇ جاري التحميل...');setTimeout(closeModal,600);
}
/* ── INIT ── */
badge();renderCsb();renderCMain();
setTimeout(()=>loadFromSheets(),1000);
</script></body></html>
